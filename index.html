<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Scanner & Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background-color: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #222222);
      margin: 0; padding: 20px;
      display: flex; flex-direction: column;
      justify-content: flex-start; align-items: center;
      height: 100vh; text-align: center;
    }
    .container { width: 90%; max-width: 400px; margin-top: 20px; }
    
    /* Styling untuk Butang */
    button {
      width: 100%; padding: 15px; font-size: 16px; font-weight: bold;
      color: white; background-color: var(--tg-theme-button-color, #2481cc);
      border: none; border-radius: 8px; cursor: pointer; margin-top: 20px;
    }
    button:disabled { background-color: #ccc; cursor: not-allowed; }

    /* Styling untuk Kotak Profil (Hasil Carian) */
    #profile-card {
      display: none; /* Tersembunyi pada mulanya */
      margin-top: 20px;
      padding: 20px;
      background-color: var(--tg-theme-secondary-bg-color, #f1f1f1);
      border-radius: 12px;
      text-align: left;
      border-left: 5px solid var(--tg-theme-button-color, #2481cc);
    }
    #profile-card h3 { margin-top: 0; color: var(--tg-theme-text-color); }
    #profile-card p { margin: 5px 0; font-size: 14px; }
    #profile-card .label { font-weight: bold; opacity: 0.7; font-size: 12px; }

    /* Styling untuk Log */
    #log-box {
      margin-top: 20px; padding: 10px;
      background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 8px; font-size: 11px; text-align: left;
      word-break: break-all; max-height: 150px; overflow-y: auto;
      opacity: 0.7;
    }
    .error { color: red; font-weight: bold; }
    .success { color: green; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <h3>🔍 Pengesahan Peserta</h3>
    <button id="startScan">IMBAS QR</button>
    
    <!-- Area untuk Papar Profil -->
    <div id="profile-card">
      <h3 id="card-title">Maklumat Peserta</h3>
      <p><span class="label">NO MATRIK:</span><br><span id="res-matrik">-</span></p>
      <p><span class="label">NAMA:</span><br><span id="res-nama">-</span></p>
      <p><span class="label">BAHAGIAN:</span><br><span id="res-bahagian">-</span></p>
    </div>

    <div id="log-box">
      Sistem sedia.<br>
    </div>
  </div>

  <script>
    // === KONFIGURASI ===
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGFF9Mh9bz_SylU3cbbaS0GK-rwGSTDv07tc5D1ySMh5RDESXavu5MJosg_HbOxOn6/exec'; 

    function log(msg, type) {
      var box = document.getElementById('log-box');
      var time = new Date().toLocaleTimeString();
      var colorClass = '';
      if(type === 'error') colorClass = 'error';
      if(type === 'success') colorClass = 'success';
      
      box.innerHTML += '<div class="' + colorClass + '">[' + time + '] ' + msg + '</div>';
      box.scrollTop = box.scrollHeight;
      console.log(msg);
    }

    // Fungsi untuk Semak Data dengan Server
    async function verifyWithSheet(qrData) {
      log('Menyambung ke server...');

      try {
        // Kita buang 'no-cors' supaya boleh terima jawapan dari server
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qrData: qrData })
        });

        const result = await response.json();

        if (result.status === 'found') {
          log('✅ Data Sah: ' + result.details.nama, 'success');
          showProfile(result.details);
          
          // Getar telefon (Success)
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
              window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
          }
        } else {
          log('❌ Data Tidak Sah: ' + result.message, 'error');
          hideProfile();
          
          // Getar telefon (Error)
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
              window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
          }
        }

      } catch (error) {
        log('❌ Ralat Sambungan: ' + error.message, 'error');
      }
    }

    // Fungsi Papar Profil
    function showProfile(data) {
      document.getElementById('res-matrik').innerText = data.noMatrik;
      document.getElementById('res-nama').innerText = data.nama;
      document.getElementById('res-bahagian').innerText = data.bahagian;
      document.getElementById('profile-card').style.display = 'block';
      document.getElementById('card-title').innerText = "✅ Pengesahan Berjaya";
      document.getElementById('profile-card').style.borderLeftColor = "green";
    }

    // Fungsi Sembunyikan Profil
    function hideProfile() {
      document.getElementById('profile-card').style.display = 'none';
    }

    // --- LOGIK UTAMA TELEGRAM ---
    try {
      if (!window.Telegram || !window.Telegram.WebApp) {
        throw new Error('GAGAL: Bukan dalam aplikasi Telegram.');
      }

      var tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      
      var btn = document.getElementById('startScan');

      if (typeof tg.showScanQrPopup === 'function') {
        btn.onclick = function() {
          hideProfile(); // Reset paparan
          tg.showScanQrPopup({ text: 'Imbas Kod QR Peserta' }, function(result) {
            tg.closeScanQrPopup();
            verifyWithSheet(result); // Hantar data untuk disemak
          });
        };
      } else {
        log('Ralat: Peranti tidak support scanner.', 'error');
        btn.disabled = true;
      }
    } catch (err) {
      log(err.message, 'error');
    }
  </script>
</body>
</html>
