<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini App QR Test</title>
  <script src="https://unpkg.com/@telegram-webapps/sdk"></script>
</head>
<body>
  <h1>Mini App Test QR</h1>
  <button id="scanBtn">Scan QR</button>

  <script>
    const scanBtn = document.getElementById("scanBtn");

    scanBtn.addEventListener("click", () => {
      Telegram.WebApp.showScanQrPopup({ text: "Scan QR" }, (result) => {
        alert("QR Scanned: " + result);
      });
    });
  </script>
</body>
</html>
