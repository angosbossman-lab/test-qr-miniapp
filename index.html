<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ParcelHub System</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6C63FF; --accent: #FF6584; --success: #4CAF50; --dark: #2D3436;
      --glass: rgba(255,255,255,0.85); --glass-border: rgba(255,255,255,0.5);
      --shadow-soft: 0 8px 32px rgba(0,0,0,0.1);
    }
    html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      background: linear-gradient(135deg, #FDFBF7 0%, #E3F2FD 50%, #F3E5F5 100%); background-attachment: fixed;
      color: var(--dark); -webkit-font-smoothing: antialiased; position: relative;
    }
    .bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; pointer-events: none; }
    .shape-1 { width: 300px; height: 300px; background: #D1C4E9; top: -50px; left: -50px; opacity: 0.6; }
    .shape-2 { width: 400px; height: 400px; background: #BBDEFB; bottom: -50px; right: -50px; opacity: 0.6; }

    .app-container { width: 100%; max-width: 450px; padding: 25px; padding-top: 30px; box-sizing: border-box; display: flex; flex-direction: column; }

    .header { text-align: center; margin-bottom: 20px; animation: float 3s ease-in-out infinite; width: 100%; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

    .banner-frame {
      width: 100%; 
      background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 20px; padding: 20px;
      box-shadow: 0 15px 35px rgba(108,99,255,0.3); display: flex; align-items: center; justify-content: center; gap: 15px;
      position: relative; overflow: hidden; box-sizing: border-box;
    }
    .banner-frame::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 10px 10px; opacity: 0.5; }
    .banner-logo { width: 50px; height: 50px; flex-shrink: 0; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
    .banner-text { text-align: left; position: relative; z-index: 1; flex-grow: 1; }
    .banner-title { font-size: 28px; font-weight: 800; color: white; margin: 0; line-height: 1; letter-spacing: 1px; }
    .banner-subtitle { font-size: 13px; color: rgba(255,255,255,0.9); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
    .subtitle { font-size: 16px; color: #636E72; margin-top: 5px; font-weight: 400; line-height: 1.4; }

    /* --- STYLING UNTUK INPUT --- */
    .input-card {
      background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px;
      box-shadow: var(--shadow-soft); box-sizing: border-box; width: 100%;
    }
    .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .input-group { flex: 1; }
    .input-label { 
      font-size: 13px; font-weight: 600; color: #636E72; margin-bottom: 6px; 
      display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.5px; 
    }
    .input-label svg { opacity: 0.7; }

    .input-field {
      width: 100%; padding: 12px; border: 1px solid rgba(0,0,0,0.05); border-radius: 10px;
      background: rgba(255,255,255,0.6); font-family: 'Outfit', sans-serif; font-size: 15px;
      color: var(--dark); box-sizing: border-box; outline: none;
      transition: all 0.2s;
    }
    .input-field:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
    
    .search-row { display: flex; gap: 10px; align-items: flex-end; }
    .search-row .input-group { margin-bottom: 0; }
    
    .btn-search {
      padding: 12px 16px; background: var(--dark); color: white; border: none; border-radius: 10px;
      font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, opacity 0.2s; flex-shrink: 0;
    }
    .btn-search:active { transform: scale(0.95); }
    /* ------------------------------------- */

    .btn-main {
      width: 100%; padding: 18px; font-size: 18px; font-weight: 700; color: white; background: var(--primary);
      border: none; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
      box-shadow: 0 10px 20px rgba(108,99,255,0.3); transition: all 0.2s ease; box-sizing: border-box;
    }
    .btn-main:active { transform: scale(0.96); }
    .btn-main:disabled { background: #B2BEC3; box-shadow: none; cursor: not-allowed; }
    .btn-collect { background: var(--success); box-shadow: 0 10px 20px rgba(76,175,80,0.3); margin-top: 20px; display: none; }

    #list-container { width: 100%; margin-top: 20px; }

    .item-card {
      background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px;
      box-shadow: var(--shadow-soft); position: relative; overflow: hidden;
      animation: slideIn 0.3s ease-out; box-sizing: border-box;
    }
    .item-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--accent); transition: background 0.3s ease; }
    .item-card.success-card::before { background: var(--success); }
    .item-card.success-card { border-color: rgba(76,175,80,0.3); }

    .card-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .status-pill {
      background: rgba(255,101,132,0.15); color: var(--accent); padding: 6px 12px; border-radius: 50px; font-size: 13px;
      font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 6px; transition: all 0.3s ease;
    }
    .status-pill.success-pill { background: rgba(76,175,80,0.15); color: var(--success); }

    .item-name { font-size: 20px; font-weight: 800; color: var(--dark); margin: 5px 0; }
    .item-meta { font-size: 15px; color: #636E72; display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .pixel-icon { width: 24px; height: 24px; display: block; }
    
    /* --- DEBUG CONTAINER (BAHAGIAN BAWAH) --- */
    .debug-container {
      display: none; /* Tersembunyi secara default (aktifkan jika staf) */
      margin-top: 30px; /* Jarak dari butang/hasil atas */
      padding-top: 20px;
      border-top: 1px solid rgba(0,0,0,0.1);
      width: 100%;
      box-sizing: border-box;
    }
    .debug-toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .debug-label {
      font-size: 14px;
      font-weight: 600;
      color: #636E72;
    }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--dark); }
    input:checked + .slider:before { transform: translateX(18px); }

    /* Kotak hitam output (tersembunyi jika switch off) */
    .debug-content {
      display: none; 
      background-color: #1e1e1e; color: #ffffff;
      border-radius: 10px; padding: 15px;
      font-family: 'Courier New', Courier, monospace; font-size: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid #333;
      margin-top: 10px;
    }
    .debug-output {
      color: #00ff00; /* Teks hijau */
      line-height: 1.5; white-space: pre-wrap;
    }
    /* ---------------------------------------- */

    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="app-container">
    
    <div class="header">
      <div class="banner-frame">
        <div class="banner-logo">
          <svg width="32" height="32" viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="14" height="10" fill="white"/><rect x="3" y="6" width="10" height="2" fill="#6C63FF"/><rect x="1" y="2" width="14" height="2" fill="white"/><rect x="7" y="8" width="2" height="6" fill="#FF6584"/></svg>
        </div>
        <div class="banner-text">
          <h1 class="banner-title">PARCELHUB</h1>
          <div class="banner-subtitle">MANAGEMENT SYSTEM</div>
        </div>
      </div>
      <div class="subtitle" id="subtitle-text">Sistem Pengedaran Pintar</div>
    </div>

    <!-- BAHAGIAN INPUT -->
    <div class="input-card">
      <div class="input-row">
        <div class="input-group">
          <label class="input-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Tarikh Mula
          </label>
          <input type="date" id="startDate" class="input-field">
        </div>
        <div class="input-group">
          <label class="input-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Tarikh Akhir
          </label>
          <input type="date" id="endDate" class="input-field">
        </div>
      </div>
      <div class="search-row">
        <div class="input-group">
          <label class="input-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            No. Matrik / ID
          </label>
          <input type="text" id="manualInput" class="input-field" placeholder="Taip di sini...">
        </div>
        <button class="btn-search" onclick="manualSearch()" title="Cari">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
      </div>
    </div>
    <!-- TAMAT BAHAGIAN INPUT -->

    <button id="scanBtn" class="btn-main" onclick="openScanner()">
      <svg class="pixel-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="5" width="14" height="9" rx="2" fill="white"/><rect x="4" y="3" width="8" height="2" fill="white"/><rect x="5" y="7" width="6" height="5" rx="3" fill="#6C63FF"/><rect x="7" y="9" width="2" height="2" fill="white"/></svg>
      IMBAS QR
    </button>

    <div id="list-container"></div>

    <button id="collectBtn" class="btn-main btn-collect" onclick="updateStatus()">
      <svg class="pixel-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="9" width="3" height="3" fill="white"/><rect x="5" y="12" width="3" height="2" fill="white"/><rect x="8" y="7" width="3" height="3" fill="white"/><rect x="11" y="2" width="3" height="5" fill="white"/></svg>
      COLLECTED
    </button>

    <!-- DEBUG CONTAINER (DI BAWAH SEKALI) -->
    <div id="debugContainer" class="debug-container">
      <div class="debug-toggle-row">
        <span class="debug-label">Mode Debug (Staf Sahaja)</span>
        <label class="switch">
          <input type="checkbox" id="debugToggle" onchange="toggleDebugMode()">
          <span class="slider"></span>
        </label>
      </div>
      <!-- Kotak hitam hanya muncul jika switch ON -->
      <div id="debugContent" class="debug-content">
        <div id="debugOutput" class="debug-output">Sistem sedia.</div>
      </div>
    </div>

  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwH_wt3htw_FXu-GPV6Ww9d7MkNB_hXosgNkvUQVskg5NaQXjsuFjTor7bQEtHfdY0/exec';
    const subtitleText = document.getElementById('subtitle-text');
    const scanBtn = document.getElementById('scanBtn');
    const listContainer = document.getElementById('list-container');
    const collectBtn = document.getElementById('collectBtn');
    
    // Rujukan Debug Elements
    const debugContainer = document.getElementById('debugContainer');
    const debugContent = document.getElementById('debugContent');
    const debugOutput = document.getElementById('debugOutput');
    const debugToggle = document.getElementById('debugToggle');
    
    // Rujukan Input Baru
    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    const manualInput = document.getElementById('manualInput');

    var rowsToUpdate = [];
    var currentItemList = [];
    var isDebugMode = false;
    var currentUserId = null;

    // Init Telegram
    if (!window.Telegram || !window.Telegram.WebApp) {
      console.warn("Env bukan Telegram");
    } else {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      if (tg.initDataUnsafe && tg.initDataUnsafe.user) currentUserId = tg.initDataUnsafe.user.id;
    }

    // Set Default Tarikh Hari Ini
    function initDates() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const todayStr = `${yyyy}-${mm}-${dd}`;
      startDateInput.value = todayStr;
      endDateInput.value = todayStr;
    }
    initDates();

    if (!SCRIPT_URL || SCRIPT_URL === 'MASUKKAN_URL_WEB_APP_ANDA_DISINI') {
      subtitleText.innerHTML = "⚠️ <b>RALAT:</b> URL Script belum diset.";
      scanBtn.disabled = true;
    }

    function toggleDebugMode() { 
      isDebugMode = debugToggle.checked;
      // Papar atau sembunyikan kotak hitam berdasarkan switch
      debugContent.style.display = isDebugMode ? 'block' : 'none';
      
      if (isDebugMode) {
        debugOutput.innerText = "Debug Mode Diaktifkan...\nMenunggu arahan.";
      }
    }

    // Fungsi untuk tukar format tarikh (HTML Date -> DD/MM/YYYY)
    function formatDateForAPI(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-'); // YYYY-MM-DD
      return `${parts[2]}/${parts[1]}/${parts[0]}`; // DD/MM/YYYY
    }

    // Fungsi Carian Manual
    function manualSearch() {
      const matrik = manualInput.value.trim();
      if (!matrik) {
        subtitleText.innerText = "⚠️ Sila masukkan No. Matrik";
        return;
      }
      verifyData(matrik);
    }

    function openScanner() {
      listContainer.innerHTML = '';
      collectBtn.style.display = 'none';
      rowsToUpdate = [];
      currentItemList = [];
      subtitleText.innerText = "Tekan butang untuk imbas";

      if (window.Telegram && window.Telegram.WebApp && typeof window.Telegram.WebApp.showScanQrPopup === 'function') {
        const tg = window.Telegram.WebApp;
        tg.showScanQrPopup({ text: 'Imbas QR Item' }, (result) => {
          tg.closeScanQrPopup();
          if (result) verifyData(result);
        });
      } else {
        subtitleText.innerText = "Buka dalam Telegram untuk guna Scanner.";
      }
    }

    async function verifyData(qrData) {
      setLoading(true);
      subtitleText.innerText = "Memproses data...";

      const startDate = formatDateForAPI(startDateInput.value);
      const endDate = formatDateForAPI(endDateInput.value);

      try {
        let url = SCRIPT_URL + '?action=search&qrData=' + encodeURIComponent(qrData) + 
                  '&startDate=' + encodeURIComponent(startDate) + 
                  '&endDate=' + encodeURIComponent(endDate);
        
        if (currentUserId) url += '&userId=' + currentUserId;

        const res = await fetch(url);
        const data = await res.json();

        // LOGIC STAF: Hanya papar container debug jika staf
        if (data.isStaff) {
          debugContainer.style.display = 'block'; // Papar keseluruhan bahagian debug
          // Jika switch sudah on, update terus output
          if (isDebugMode) {
             debugOutput.innerText = `USER: ${data.staffName}\nID: ${currentUserId || 'N/A'}\nSTATUS: Staff Detected`;
          }
          subtitleText.innerText = "Selamat Datang, " + data.staffName;
        } else {
          debugContainer.style.display = 'none'; // Sembunyikan jika bukan staf
          subtitleText.innerText = "Selamat Datang";
        }

        if (data.status === 'found_pending') {
          subtitleText.innerText += ` Dijumpai ${data.list.length} item.`;
          rowsToUpdate = data.list.map(item => item.rowIndex);
          currentItemList = data.list;
          renderList(currentItemList, false);
          if (data.isStaff) collectBtn.style.display = 'flex';
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
          }
        } else if (data.status === 'not_found') {
          subtitleText.innerText += " Tiada item dalam julat tarikh ini.";
          listContainer.innerHTML = `<div style="text-align:center; padding:20px; opacity:0.6;">Tiada rekod antara ${startDate} hingga ${endDate}</div>`;
        } else {
          subtitleText.innerText = "❌ " + data.message;
        }
      } catch (err) {
        subtitleText.innerText = "❌ Ralat: " + err.message;
        if (isDebugMode) {
            debugOutput.innerText += `\nERROR: ${err.message}`;
        }
      } finally {
        setLoading(false);
      }
    }

    async function updateStatus() {
      if (rowsToUpdate.length === 0) return;
      setLoading(true);
      subtitleText.innerText = "Menyimpan...";
      if (isDebugMode) debugOutput.innerText = "Mengemaskini status...";

      try {
        let url = SCRIPT_URL + '?action=update&rows=' + rowsToUpdate.join(',') + (currentUserId ? '&userId=' + currentUserId : '');
        const res = await fetch(url);
        const data = await res.json();

        if (data.status === 'success') {
          subtitleText.innerHTML = "✅ <b>Berjaya dikemaskini!</b>";
          if (isDebugMode) debugOutput.innerText = "Status Update: SUCCESS";
          
          renderList(currentItemList, true); 
          collectBtn.style.display = 'none';
          rowsToUpdate = [];
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
          }
        } else {
          throw new Error(data.message);
        }
      } catch (err) {
        subtitleText.innerText = "❌ Gagal: " + err.message;
        if (isDebugMode) debugOutput.innerText = `ERROR: ${err.message}`;
      } finally {
        setLoading(false);
      }
    }

    function renderList(items, isSuccess) {
      const fragment = document.createDocumentFragment();
      
      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = isSuccess ? 'item-card success-card' : 'item-card';
        
        var statusText = isSuccess ? "COLLECTED" : "PENDING";
        var pillClass = isSuccess ? "status-pill success-pill" : "status-pill";
        var statusIcon = isSuccess 
          ? `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="9" width="3" height="3" fill="currentColor"/><rect x="5" y="12" width="3" height="2" fill="currentColor"/><rect x="8" y="7" width="3" height="3" fill="currentColor"/><rect x="11" y="2" width="3" height="5" fill="currentColor"/></svg>` 
          : `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="3" y="1" width="10" height="14" rx="5" stroke="currentColor" stroke-width="2" fill="none"/><rect x="7" y="4" width="2" height="4" fill="currentColor"/></svg>`;

        card.innerHTML = `
          <div class="card-row"><div class="${pillClass}">${statusIcon} ${statusText}</div></div>
          <div class="item-name">${item.namaItem}</div>
          <div class="item-meta">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="6" y="2" width="4" height="4" fill="#636E72"/><rect x="4" y="8" width="8" height="2" fill="#636E72"/><rect x="3" y="10" width="2" height="4" fill="#636E72"/><rect x="11" y="10" width="2" height="4" fill="#636E72"/></svg>
            ${item.nama}
          </div>
          <div class="item-meta" style="font-size: 14px; opacity: 0.8;">ID: ${item.noMatrik}</div>
        `;
        fragment.appendChild(card);
      });
      
      listContainer.innerHTML = ''; 
      listContainer.appendChild(fragment);
    }

    function setLoading(isLoading) {
      scanBtn.disabled = isLoading;
      if(collectBtn) collectBtn.disabled = isLoading;
      if (isLoading) {
        scanBtn.innerHTML = `<svg class="pixel-icon" style="animation: spin 1s linear infinite" viewBox="0 0 16 16"><rect x="7" y="1" width="2" height="6" fill="white"/><rect x="3" y="3" width="2" height="2" fill="white" opacity="0.5"/></svg> MEMPROSES...`;
      } else {
        scanBtn.innerHTML = `<svg class="pixel-icon" viewBox="0 0 16 16"><rect x="1" y="5" width="14" height="9" rx="2" fill="white"/><rect x="4" y="3" width="8" height="2" fill="white"/><rect x="5" y="7" width="6" height="5" rx="3" fill="#6C63FF"/><rect x="7" y="9" width="2" height="2" fill="white"/></svg> IMBAS QR`;
      }
    }

    const style = document.createElement('style');
    style.innerHTML = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
    document.head.appendChild(style);

  </script>
</body>
</html>
