<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test QR Scanner</title>
</head>
<body>
<h2>Mini App QR Test</h2>
<button id="scanBtn">Scan QR</button>
<p id="result"></p>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
Telegram.WebApp.ready();

const btn = document.getElementById("scanBtn");
const result = document.getElementById("result");

// URL Web App Google Apps Script
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwZnIok4DaNDAnoEE1kgtRurNfLi8jEVF48AjsvJrf7K_iUimh_PuOBfePiOj9UEnj-/exec";

btn.addEventListener("click", () => {
    if (Telegram.WebApp.showScanQrPopup) {
        Telegram.WebApp.showScanQrPopup(
            { text: "Scan QR Code" },
            function(data) {
                result.textContent = "QR Code: " + data;

                // Hantar data ke Google Sheet melalui Apps Script
                fetch(WEBAPP_URL + "?chat_id=" + Telegram.WebApp.initData.user.id + "&qr=" + encodeURIComponent(data))
                .then(res => res.text())
                .then(txt => console.log(txt))
                .catch(err => console.error(err));

                Telegram.WebApp.closeScanQrPopup();
            }
        );
    } else {
        alert("QR scanner hanya berfungsi dalam Telegram Mini App");
    }
});
</script>
</body>
</html>
