<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test QR Scanner</title>
</head>
<body>
<h2>Mini App QR Test</h2>
<button id="scanBtn">Scan QR</button>
<p id="result"></p>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  // Pastikan Web App siap sebelum kita panggil QR
  Telegram.WebApp.ready();

  const btn = document.getElementById("scanBtn");
  const result = document.getElementById("result");

  btn.addEventListener("click", () => {
      if (Telegram.WebApp.showScanQrPopup) {
          Telegram.WebApp.showScanQrPopup(
              { text: "Scan QR Code" },
              function(data) {
                  result.textContent = "QR Code: " + data;
                  Telegram.WebApp.closeScanQrPopup();
              }
          );
      } else {
          alert("QR scanner hanya berfungsi dalam Telegram Mini App");
      }
  });
</script>
</body>
</html>
